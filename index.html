<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Тест 2.0</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Тест 2.0">
    <meta name="mobile-web-app-capable" content="yes">

    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="android-chrome-512x512.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <script src="data.js?v=30.04.3"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-card: #1a1a1a;
            --accent-cyan: #00f0ff;
            --accent-cyan-glow: rgba(0, 240, 255, 0.3);
            --accent-cyan-dim: rgba(0, 240, 255, 0.1);
            --accent-green: #4ade80;
            --accent-yellow: #facc15;
            --accent-yellow-glow: rgba(250, 204, 21, 0.25);
            --error-red: #f87171;
            --error-red-glow: rgba(255, 68, 68, 0.3);
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --border-color: #333333;
            --base-font-size-search: 1.3rem;
            --base-font-size-title: 16px;
            --base-font-size-detail: 13px;
            --base-font-size-label: 13px;
            --base-font-size-button: 13px;
            --base-font-size-context: 0.85rem;
            --base-font-size-no-results: 14px;
        }
        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .screen {
            display: none;
            min-height: 100vh;
            width: 100%;
        }
        .screen.active {
            display: flex;
            flex-direction: column;
        }
        #loading-screen {
            justify-content: center;
            align-items: center;
            background: var(--bg-primary);
            padding: 20px;
        }

        .neon-loader-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .neon-ring {
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 2px solid rgba(0, 240, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.2), inset 0 0 20px rgba(0, 240, 255, 0.1);
            animation: ringPulse 2s ease-in-out infinite;
        }
        .neon-ring:nth-child(2) {
            width: 230px;
            height: 230px;
            border-color: rgba(0, 240, 255, 0.15);
            animation-delay: -0.5s;
            animation-duration: 2.5s;
        }
        .neon-ring:nth-child(3) {
            width: 260px;
            height: 260px;
            border-color: rgba(0, 240, 255, 0.08);
            animation-delay: -1s;
            animation-duration: 3s;
        }
        @keyframes ringPulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 1; }
        }
        .version {
            font-size: 90px;
            font-weight: 900;
            color: #00f0ff;
            text-shadow: 0 0 10px #00f0ff, 0 0 20px #00f0ff, 0 0 40px #00f0ff, 0 0 80px #00f0ff;
            z-index: 10;
            animation: versionGlow 2s ease-in-out infinite;
            letter-spacing: -2px;
            font-family: inherit;
        }
        @keyframes versionGlow {
            0%, 100% { text-shadow: 0 0 10px #00f0ff, 0 0 20px #00f0ff, 0 0 40px #00f0ff; }
            50% { text-shadow: 0 0 20px #00f0ff, 0 0 40px #00f0ff, 0 0 80px #00f0ff, 0 0 120px #00f0ff; }
        }
        .scan-line {
            position: absolute;
            width: 250px;
            height: 2px;
            background: linear-gradient(to right, transparent, #00f0ff, transparent);
            box-shadow: 0 0 15px #00f0ff;
            animation: scanMove 2s ease-in-out infinite;
            z-index: 15;
        }
        @keyframes scanMove {
            0%, 100% { top: 30%; opacity: 0; }
            10% { opacity: 1; }
            50% { top: 70%; }
            90% { opacity: 1; }
        }
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #00f0ff;
            border-radius: 50%;
            box-shadow: 0 0 6px #00f0ff;
            opacity: 0;
        }
        @keyframes particleOrbit {
            0% { opacity: 0; transform: rotate(0deg) translateX(var(--orbit)) rotate(0deg); }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { opacity: 0; transform: rotate(360deg) translateX(var(--orbit)) rotate(-360deg); }
        }
        .status-text {
            position: absolute;
            bottom: 60px;
            color: #00f0ff;
            font-size: 14px;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 0 10px #00f0ff;
            animation: textPulse 1.5s ease-in-out infinite;
        }
        @keyframes textPulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
        .progress-container {
            position: absolute;
            bottom: 30px;
            width: 200px;
            height: 3px;
            background: rgba(0, 240, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, #00f0ff, #00cccc);
            box-shadow: 0 0 10px #00f0ff;
            border-radius: 2px;
            animation: progressFill 3s ease-in-out infinite;
        }
        @keyframes progressFill {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }
        .lock-icon {
            position: absolute;
            top: 50px;
            font-size: 24px;
            color: #00f0ff;
            text-shadow: 0 0 10px #00f0ff;
            animation: lockPulse 1s ease-in-out infinite;
        }
        @keyframes lockPulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }
        .matrix-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            opacity: 0.08;
            pointer-events: none;
        }
        .matrix-char {
            position: absolute;
            color: #00f0ff;
            font-size: 12px;
            font-family: monospace;
            animation: matrixFall 3s linear infinite;
        }
        @keyframes matrixFall {
            0% { transform: translateY(-20px); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(420px); opacity: 0; }
        }
        @media (max-width: 480px) {
            .neon-loader-container { transform: scale(0.8); height: 350px; }
            .version { font-size: 70px; }
        }

        #login-screen {
            justify-content: center;
            align-items: center;
            background: var(--bg-primary);
            padding: 20px;
            min-height: 100vh;
        }
        .login-card {
            background: transparent;
            border-radius: 24px;
            padding: 40px 28px;
            width: 100%;
            max-width: 380px;
            margin: 0 auto;
            box-shadow: none;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--accent-cyan);
            text-shadow: 0 0 20px var(--accent-cyan-glow);
            letter-spacing: -0.5px;
        }
        .login-subtitle {
            color: var(--text-secondary);
            font-size: 15px;
            font-weight: 400;
        }

        .pin-dots-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            margin-bottom: 40px;
            min-height: 24px;
        }
        .pin-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid var(--border-color);
            background: transparent;
            transition: all 0.2s ease;
        }
        .pin-dot.filled {
            background: var(--accent-cyan);
            border-color: var(--accent-cyan);
            box-shadow: 0 0 12px var(--accent-cyan-glow);
        }
        .pin-dot.error {
            background: var(--error-red);
            border-color: var(--error-red);
            box-shadow: 0 0 12px var(--error-red-glow);
            animation: shake 0.4s ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        .pin-hidden-input {
            position: absolute;
            opacity: 0;
            pointer-events: none;
            width: 1px;
            height: 1px;
        }

        .pin-pad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            width: 100%;
            max-width: 300px;
            margin-bottom: 30px;
        }
        .pin-btn {
            aspect-ratio: 1;
            border-radius: 50%;
            border: 1.5px solid var(--border-color);
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 28px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            user-select: none;
            -webkit-user-select: none;
            position: relative;
            overflow: hidden;
        }
        .pin-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            transform: translate(-50%, -50%);
            transition: width 0.3s ease, height 0.3s ease;
        }
        .pin-btn:active::after {
            width: 100%;
            height: 100%;
        }
        .pin-btn:active {
            transform: scale(0.92);
            border-color: var(--accent-cyan);
            box-shadow: 0 0 20px var(--accent-cyan-glow);
            background: var(--bg-card);
        }
        .pin-btn.empty {
            visibility: hidden;
            pointer-events: none;
        }
        .pin-btn.backspace {
            font-size: 22px;
            color: var(--text-secondary);
        }
        .pin-btn.backspace:active {
            border-color: var(--error-red);
            color: var(--error-red);
            box-shadow: 0 0 15px var(--error-red-glow);
        }

        .forgot-pin {
            color: var(--text-secondary);
            font-size: 15px;
            text-decoration: underline;
            text-underline-offset: 3px;
            cursor: pointer;
            background: none;
            border: none;
            font-family: inherit;
            transition: color 0.2s;
            margin-top: 10px;
        }
        .forgot-pin:hover {
            color: var(--accent-cyan);
        }

        @media (max-width: 380px) {
            .pin-pad {
                gap: 12px;
            }
            .pin-btn {
                font-size: 24px;
            }
            .login-card {
                padding: 30px 20px;
            }
        }
        @media (max-height: 700px) {
            .login-card {
                padding: 25px 20px;
            }
            .pin-dots-container {
                margin-bottom: 25px;
            }
            .pin-pad {
                margin-bottom: 20px;
            }
        }

        #main-screen {
            background: var(--bg-primary);
            padding: 20px 16px;
            min-height: 100vh;
            position: relative;
        }
        #main-screen::before {
            content: '';
            position: fixed;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 180px;
            height: 180px;
            background-image: url('logo.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0.25;
            pointer-events: none;
            z-index: 0;
            animation: logoPulse 3s ease-in-out infinite;
        }
        @keyframes logoPulse {
            0%, 100% {
                opacity: 0.25;
                filter: brightness(1) drop-shadow(0 0 0px rgba(0, 240, 255, 0));
            }
            50% {
                opacity: 0.55;
                filter: brightness(1.2) drop-shadow(0 0 15px rgba(0, 240, 255, 0.3));
            }
        }
        .main-container {
            max-width: 480px;
            margin: 0 auto;
            width: 100%;
            position: relative;
            z-index: 1;
        }
        .sticky-search-wrapper {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg-primary);
            padding-top: 0;
            margin: 0 -16px;
            padding-left: 16px;
            padding-right: 16px;
        }

        .search-input {
            text-align: center;
            width: 100%;
            box-sizing: border-box;
        }
        .header-info {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            width: 100%;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }
        .header-titles {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            text-align: left;
        }
        .greeting {
            font-size: 20px;
            font-weight: 500;
            margin: 0;
            color: var(--text-primary);
        }
        h2.greeting {
            font-size: 22px;
            margin-bottom: 4px;
            color: var(--accent-cyan);
            text-shadow: 0 0 15px var(--accent-cyan-glow);
            font-weight: 600;
        }
        h3.greeting {
            font-size: 14px;
            font-weight: 400;
            color: var(--text-secondary);
        }
        .menu-btn {
            width: auto;
            background: rgba(220, 20, 20, 0.15);
            border: 1px solid rgba(220, 20, 20, 0.4);
            border-radius: 25px;
            padding: 8px 20px;
            color: #dc1414;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            flex-shrink: 0;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 0 12px rgba(220, 20, 20, 0.2);
        }
        .menu-btn:hover {
            background: rgba(220, 20, 20, 0.3);
            box-shadow: 0 0 18px rgba(220, 20, 20, 0.4);
            border-color: #dc1414;
        }
        .zoom-panel {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
            gap: 12px;
            width: 100%;
        }
        .zoom-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 6px 16px;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            min-width: 44px;
        }
        .zoom-btn:hover {
            border-color: var(--accent-green);
            color: var(--accent-green);
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.3);
            background: transparent;
        }
        .zoom-btn:active {
            transform: scale(0.95);
        }
        .zoom-indicator {
            color: var(--accent-green);
            font-size: 14px;
            font-weight: 600;
            padding: 4px 14px;
            background: rgba(74, 222, 128, 0.1);
            border-radius: 20px;
            min-width: 85px;
            text-align: center;
        }
        .drawer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.3s ease, opacity 0.3s ease;
        }
        .drawer-overlay.active {
            visibility: visible;
            opacity: 1;
        }
        .drawer {
            position: fixed;
            top: 0;
            right: -50%;
            width: 50%;
            height: 100%;
            background: var(--bg-card);
            border-left: 1px solid var(--border-color);
            box-shadow: -5px 0 30px rgba(0, 0, 0, 0.5);
            z-index: 1001;
            transition: right 0.35s ease-out;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .drawer.active {
            right: 0;
        }
        @media (max-width: 768px) {
            .drawer { width: 50%; right: -50%; }
        }
        @media (max-width: 480px) {
            .drawer { width: 50%; right: -50%; }
        }
        .drawer-header {
            padding: 24px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .drawer-header h3 {
            color: var(--accent-cyan);
            font-size: 18px;
            font-weight: 600;
            transition: font-size 0.3s ease;
        }
        .drawer-close {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 24px;
            cursor: pointer;
            padding: 0 8px;
            transition: color 0.2s;
        }
        .drawer-close:hover {
            color: var(--error-red);
        }
        .drawer-menu {
            flex: 1;
            padding: 16px 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .drawer-item {
            background: transparent;
            border: none;
            padding: 14px 20px;
            text-align: left;
            color: var(--text-primary);
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s ease;
            width: 100%;
            border-bottom: 1px solid var(--border-color);
        }
        .drawer-item:hover {
            background: rgba(0, 240, 255, 0.1);
            color: var(--accent-cyan);
            padding-left: 24px;
        }
        .drawer-item .item-icon {
            font-size: 18px;
            min-width: 28px;
        }
        .drawer-submenu {
            display: none;
            flex-direction: column;
            background: var(--bg-secondary);
            margin: 0;
            border-radius: 0;
        }
        .drawer-submenu.active {
            display: flex;
        }
        .drawer-submenu .drawer-item {
            padding-left: 48px;
            font-size: 14px;
        }
        .drawer-back {
            border-top: 1px solid var(--border-color);
            margin-top: 8px;
            color: var(--text-secondary);
        }
        .drawer-back:hover {
            color: var(--accent-cyan);
        }
        .search-section {
            margin-bottom: 16px;
            width: 100%;
        }
        .search-input {
            width: 100%;
            background: var(--bg-secondary);
            border: 2px solid var(--accent-cyan);
            border-radius: 14px;
            padding: 16px 18px;
            color: var(--text-primary);
            font-size: var(--base-font-size-search);
            outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px var(--accent-cyan-glow), inset 0 0 8px var(--accent-cyan-dim);
            text-align: left;
        }
        .search-input:hover {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 28px var(--accent-cyan-glow), inset 0 0 12px var(--accent-cyan-dim);
            background: var(--bg-card);
        }
        .search-input:focus {
            border-color: var(--accent-cyan);
            background: var(--bg-card);
            box-shadow: 0 0 32px var(--accent-cyan-glow), inset 0 0 14px var(--accent-cyan-dim);
        }
        @keyframes marquee {
            0% { text-indent: 0; }
            50% { text-indent: -30px; }
            100% { text-indent: 0; }
        }
        .search-input::placeholder {
            color: var(--text-muted);
            font-size: 1rem;
            animation: marquee 8s ease-in-out infinite;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: clip;
            text-align: center;
        }
        .results-container {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            z-index: 1;
        }

        .results-container.restored-result .result-card * {
            color: var(--text-secondary) !important;
        }

        .results-container.restored-result .match-percent {
            display: none !important;
        }

        .results-container.restored-result .parking-buttons {
            display: none !important;
        }

        .results-container.restored-result .result-icon {
            color: inherit !important;
            opacity: 0.5;
        }

        .results-container.restored-result .contact-link {
            color: var(--text-secondary) !important;
        }
        .results-container.restored-result .contact-link:hover {
            color: var(--accent-cyan) !important;
        }

        .result-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            gap: 14px;
            border: 1px solid var(--border-color);
            transition: all 0.2s;
            cursor: pointer;
            position: relative;
            z-index: 1;
        }
        .result-card:hover {
            border-color: var(--accent-cyan);
            transform: translateX(4px);
            box-shadow: 0 0 20px var(--accent-cyan-glow);
        }
        .result-icon { font-size: 28px; flex-shrink: 0; }
        .result-content { flex: 1; }

    <script>
        (function() {
            'use strict';

            // ======== КОНФИГУРАЦИЯ ========
            const CONFIG = {
                PIN_LENGTH: 4,
                MIN_ZOOM: 70,
                MAX_ZOOM: 150,
                ZOOM_STEP: 10,
                SESSION_DURATION: 30 * 24 * 60 * 60 * 1000,
                PIN_MAX_AGE: 7 * 24 * 60 * 60 * 1000,
                FORCE_UPDATE_BANNER: true,
                SW_SCOPE: './'
            };

            // ======== УРОВНИ ДОСТУПА ========
            const ACCESS_LEVELS = {
                '83e19a9ce479dc064bab4bd50134db14918cc967debd3ad223bb8993c523788d': {
                    level: 3,
                    name: 'Администратор',
                    greeting: 'доступ ⭐️⭐️⭐️',
                    permissions: ['contacts', 'stations', 'parking', 'documents']
                },
                '775988758f13f17d20e083ed112c78ad3b62be322f501d4a61ca174a704be1a7': {
                    level: 2,
                    name: 'Оператор',
                    greeting: 'доступ ⭐️⭐️',
                    permissions: ['contacts', 'stations', 'parking']
                },
                'c5165083befc92b41c6c93d615f2b0239c2f7f1d7232991f3edb6f15cc638794': {
                    level: 1,
                    name: 'Пользователь',
                    greeting: 'доступ ⭐️',
                    permissions: ['contacts', 'parking']
                }
            };

            // ======== КЛЮЧИ ХРАНИЛИЩА ========
            const STORAGE_KEYS = {
                LAST_RESULTS: 'infa_last_results_raw',
                LAST_QUERY: 'infa_last_query',
                ZOOM: 'infa_zoom',
                PARKING_DATA: 'infa_parking_user_data',
                SESSION_DATA: 'infa_session_data',
                SESSION_TIMESTAMP: 'infa_session_timestamp',
                LAST_UPDATED_VERSION: 'infa_last_updated_version',
                SW_CACHE_VERSION: 'infa_sw_cache_version',
                BANNER_SHOWN_PREFIX: 'infa_banner_shown_'
            };

            // ======== ГЛОБАЛЬНЫЕ ДАННЫЕ (из data.js) ========
            let CONTACTS_DATA = [];
            let STATIONS_DATA = [];
            let DOCUMENTS_DATA = [];
            let PARKING_DATA = [];

            // ======== УТИЛИТЫ ========
            function escapeHtml(text) {
                if (!text) return '';
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            function verifyAccessCode(inputCode) {
                if (!inputCode || typeof inputCode !== 'string') return null;
                const hash = CryptoJS.SHA256(inputCode.trim()).toString();
                const userData = ACCESS_LEVELS[hash];
                if (userData) {
                    return { ...userData, enteredCode: inputCode.trim() };
                }
                return null;
            }

            function decryptData(encryptedBase64, password) {
                if (!encryptedBase64 || !password || encryptedBase64.trim() === '') {
                    return [];
                }
                try {
                    const decrypted = CryptoJS.AES.decrypt(encryptedBase64, password);
                    const decryptedStr = decrypted.toString(CryptoJS.enc.Utf8);
                    if (!decryptedStr) {
                        console.warn('Decrypt returned empty string');
                        return [];
                    }
                    return JSON.parse(decryptedStr);
                } catch(e) {
                    console.error('Decrypt error:', e);
                    return [];
                }
            }

            function isSessionValid() {
                const timestamp = localStorage.getItem(STORAGE_KEYS.SESSION_TIMESTAMP);
                if (!timestamp) return false;
                const ts = parseInt(timestamp, 10);
                if (isNaN(ts)) return false;
                return (Date.now() - ts) < CONFIG.SESSION_DURATION;
            }

            // ======== БЕЗОПАСНОЕ ХРАНЕНИЕ PIN ========
            class SecurePinStorage {
                constructor() {
                    this.storageKey = 'infa_encrypted_pin';
                    this.saltKey = 'infa_pin_salt';
                }

                _getSalt() {
                    let salt = sessionStorage.getItem(this.saltKey);
                    if (!salt) {
                        salt = CryptoJS.lib.WordArray.random(32).toString();
                        sessionStorage.setItem(this.saltKey, salt);
                    }
                    return salt;
                }

                storeEncryptedPin(enteredPin, userLevel) {
                    try {
                        const salt = this._getSalt();
                        const pinData = {
                            pin: enteredPin,
                            level: userLevel,
                            timestamp: Date.now()
                        };

                        const encrypted = CryptoJS.AES.encrypt(
                            JSON.stringify(pinData),
                            salt
                        ).toString();

                        sessionStorage.setItem(this.storageKey, encrypted);
                        return true;
                    } catch(e) {
                        console.error('Pin storage error:', e);
                        return false;
                    }
                }

                retrievePin() {
                    const encrypted = sessionStorage.getItem(this.storageKey);
                    if (!encrypted) return null;

                    try {
                        const salt = this._getSalt();
                        const decrypted = CryptoJS.AES.decrypt(encrypted, salt);
                        const pinData = JSON.parse(decrypted.toString(CryptoJS.enc.Utf8));

                        if (Date.now() - pinData.timestamp > CONFIG.PIN_MAX_AGE) {
                            this.clear();
                            return null;
                        }

                        return pinData.pin;
                    } catch(e) {
                        this.clear();
                        return null;
                    }
                }

                clear() {
                    sessionStorage.removeItem(this.storageKey);
                    sessionStorage.removeItem(this.saltKey);
                }

                hasValidPin() {
                    return this.retrievePin() !== null;
                }
            }

            // ======== РАБОТА С ДАННЫМИ ========
            function decryptAllDataWithCode(userData) {
                if (!userData || !userData.enteredCode) {
                    console.error('No access code provided for decryption');
                    return false;
                }

                const accessCode = userData.enteredCode;
                const level = userData.level;

                const hasLevel3Data = typeof ENCRYPTED_CONTACTS_LEVEL3 !== 'undefined';
                const hasLevel2Data = typeof ENCRYPTED_CONTACTS_LEVEL2 !== 'undefined';
                const hasLevel1Data = typeof ENCRYPTED_CONTACTS_LEVEL1 !== 'undefined';

                if (level === 3) {
                    if (!hasLevel3Data) {
                        console.error('Level 3 data not available');
                        return false;
                    }
                    CONTACTS_DATA = decryptData(ENCRYPTED_CONTACTS_LEVEL3, accessCode);
                    STATIONS_DATA = decryptData(ENCRYPTED_STATIONS_LEVEL3, accessCode);
                    PARKING_DATA = decryptData(ENCRYPTED_PARKING_LEVEL3, accessCode);
                    DOCUMENTS_DATA = decryptData(ENCRYPTED_DOCUMENTS_LEVEL3, accessCode);
                } else if (level === 2) {
                    if (!hasLevel2Data) {
                        console.error('Level 2 data not available');
                        return false;
                    }
                    CONTACTS_DATA = decryptData(ENCRYPTED_CONTACTS_LEVEL2, accessCode);
                    STATIONS_DATA = decryptData(ENCRYPTED_STATIONS_LEVEL2, accessCode);
                    PARKING_DATA = decryptData(ENCRYPTED_PARKING_LEVEL2, accessCode);
                    DOCUMENTS_DATA = [];
                } else if (level === 1) {
                    if (!hasLevel1Data) {
                        console.error('Level 1 data not available');
                        return false;
                    }
                    CONTACTS_DATA = decryptData(ENCRYPTED_CONTACTS_LEVEL1, accessCode);
                    PARKING_DATA = decryptData(ENCRYPTED_PARKING_LEVEL1, accessCode);
                    STATIONS_DATA = [];
                    DOCUMENTS_DATA = [];
                }

                const hasAnyData = CONTACTS_DATA.length > 0 || STATIONS_DATA.length > 0 || 
                                   PARKING_DATA.length > 0 || DOCUMENTS_DATA.length > 0;

                if (!hasAnyData) {
                    console.warn('All decrypted arrays are empty - possible wrong PIN or corrupted data');
                }

                return true;
            }

            function saveSession(userData) {
                if (!userData || !userData.enteredCode) return;

                const pinStorage = new SecurePinStorage();
                pinStorage.storeEncryptedPin(userData.enteredCode, userData.level);

                const sessionData = {
                    accessCodeHash: CryptoJS.SHA256(userData.enteredCode).toString(),
                    level: userData.level,
                    permissions: userData.permissions,
                    timestamp: Date.now(),
                    appVersion: typeof APP_VERSION !== 'undefined' ? APP_VERSION : '1.0'
                };

                localStorage.setItem(STORAGE_KEYS.SESSION_DATA, JSON.stringify(sessionData));
                localStorage.setItem(STORAGE_KEYS.SESSION_TIMESTAMP, sessionData.timestamp);
            }

            function restoreSessionFromStorage() {
                if (!isSessionValid()) {
                    localStorage.removeItem(STORAGE_KEYS.SESSION_DATA);
                    localStorage.removeItem(STORAGE_KEYS.SESSION_TIMESTAMP);
                    return null;
                }

                const sessionData = localStorage.getItem(STORAGE_KEYS.SESSION_DATA);
                if (!sessionData) return null;

                try {
                    const data = JSON.parse(sessionData);
                    const userData = ACCESS_LEVELS[data.accessCodeHash];

                    if (!userData) {
                        console.warn('Session hash not found in access levels');
                        return null;
                    }

                    return { ...userData, enteredCode: null };
                } catch(e) {
                    console.error('Session restore error:', e);
                    return null;
                }
            }

            // ======== БАЗА ДАННЫХ ========
            const DATABASE = {
                users: [],
                stations: [],
                contacts: [],
                documents: [],
                parking: [],
                currentUser: null,
                isInitialized: false,

                init() {
                    this.users = Object.values(ACCESS_LEVELS);
                    this.contacts = CONTACTS_DATA || [];
                    this.stations = STATIONS_DATA || [];
                    this.documents = DOCUMENTS_DATA || [];
                    this.parking = PARKING_DATA || [];
                    this.isInitialized = true;
                },

                calculateMatchPercent(text, query) {
                    if (!text || !query) return 0;
                    const t = text.toLowerCase();
                    const q = query.toLowerCase();
                    if (t === q) return 100;
                    if (t.includes(q)) return Math.min((q.length / t.length) * 100, 99);
                    return 0;
                },

                hasPermission(perm) {
                    return this.currentUser && this.currentUser.permissions && 
                           this.currentUser.permissions.includes(perm);
                },

                searchStationsRanked(q) {
                    if (!q || !this.hasPermission('stations')) return [];
                    const lq = q.toLowerCase().trim();
                    const res = [];
                    (this.stations || []).forEach(s => {
                        let best = 0;
                        if (s.searchName) best = Math.max(best, this.calculateMatchPercent(s.searchName, lq));
                        if (s['телефон']) best = Math.max(best, this.calculateMatchPercent(s['телефон'], lq));
                        if (best > 0) res.push({ ...s, type: 'station', matchPercent: best });
                    });
                    return res;
                },

                searchParkingRanked(q) {
                    if (!q || !this.hasPermission('parking')) return [];
                    const lq = q.toLowerCase().trim();
                    const res = [];
                    (this.parking || []).forEach(p => {
                        let best = 0;
                        if (p.searchName) best = Math.max(best, this.calculateMatchPercent(p.searchName, lq));
                        if (best > 0) res.push({ ...p, type: 'parking', matchPercent: best });
                    });
                    return res;
                },

                searchContactsRanked(q) {
                    if (!q || !this.hasPermission('contacts')) return [];
                    const lq = q.toLowerCase().trim();
                    const res = [];
                    (this.contacts || []).forEach(c => {
                        let best = 0;
                        if (c.searchName) best = Math.max(best, this.calculateMatchPercent(c.searchName, lq));
                        if (c['телефон']) best = Math.max(best, this.calculateMatchPercent(c['телефон'], lq));
                        if (best > 0) res.push({ ...c, type: 'contact', matchPercent: best });
                    });
                    return res;
                },

                searchDocumentsRanked(q) {
                    if (!q || !this.hasPermission('documents')) return [];
                    const lq = q.toLowerCase().trim();
                    const res = [];
                    (this.documents || []).forEach(d => {
                        let best = 0;
                        if (d.searchName) best = Math.max(best, this.calculateMatchPercent(d.searchName, lq));
                        if (best > 0) res.push({ ...d, type: 'document', matchPercent: best });
                    });
                    return res;
                },

                searchAllRanked(q) {
                    let allResults = [
                        ...this.searchStationsRanked(q),
                        ...this.searchParkingRanked(q),
                        ...this.searchContactsRanked(q),
                        ...this.searchDocumentsRanked(q)
                    ];
                    allResults.sort((a, b) => b.matchPercent - a.matchPercent);
                    return allResults;
                },

                setCurrentUser(u) {
                    this.currentUser = u;
                }
            };

            // ======== UI ПАРКОВКИ ========
            const ParkingUI = {
                userParkingData: {},

                init() {
                    this.loadUserData();
                },

                loadUserData() {
                    try {
                        const saved = localStorage.getItem(STORAGE_KEYS.PARKING_DATA);
                        if (saved) this.userParkingData = JSON.parse(saved);
                    } catch(e) {
                        this.userParkingData = {};
                    }
                },

                saveUserData() {
                    localStorage.setItem(STORAGE_KEYS.PARKING_DATA, JSON.stringify(this.userParkingData));
                },

                getUserNote(parkingId) {
                    if (!parkingId || !this.userParkingData[parkingId]) return null;
                    return this.userParkingData[parkingId].note;
                },

                updateParkingNote(parkingId, newNote) {
                    if (!parkingId) return false;

                    const exists = (PARKING_DATA || []).some(p => p.id === parkingId);
                    if (!exists) return false;

                    if (!this.userParkingData[parkingId]) this.userParkingData[parkingId] = {};
                    this.userParkingData[parkingId].note = newNote;
                    this.userParkingData[parkingId].updatedAt = new Date().toISOString();
                    this.saveUserData();
                    return true;
                }
            };

            // ======== ГЛАВНЫЙ КЛАСС ПРИЛОЖЕНИЯ ========
            class InfaApp {
                constructor() {
                    this.currentUser = null;
                    this.isLoggedIn = false;
                    this.currentZoom = 100;
                    this.drawerCloseTimer = null;
                    this.pinCode = "";
                    this.isRestoredResults = false;
                    this.currentDataVersion = null;
                    this.bannerShown = false;
                    this.bannerHiddenBySwipe = false;
                    this.bannerGlobalListenersActive = false;
                    this._parkingHandlers = new Map();
                    this._boundKeyHandler = null;
                    this.init();
                }

                cacheElements() {
                    this.loadingScreen = document.getElementById('loading-screen');
                    this.loginScreen = document.getElementById('login-screen');
                    this.mainScreen = document.getElementById('main-screen');
                    this.loadingText = document.getElementById('loading-status-text');
                    this.usernameSpan = document.getElementById('username');
                    this.menuBtn = document.getElementById('menu-btn');

                    this.resultsContainer = document.getElementById('results-container');
                    this.notification = document.getElementById('notification');

                    this.pinPad = document.getElementById('pin-pad');

                    this.pinHiddenInput = document.getElementById('login-password-hidden');
                    this.forgotPinBtn = document.getElementById('forgot-pin-btn');

                    this.drawerOverlay = document.getElementById('drawer-overlay');

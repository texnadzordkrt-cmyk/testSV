<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Инфа под рукой 2.0</title>
    
    <!-- PWA meta tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Инфа под рукой">
    <meta name="mobile-web-app-capable" content="yes">
    
    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png?v=2.3.8">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png?v=2.3.8">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=2.3.8">
    <link rel="icon" type="image/png" sizes="192x192" href="android-chrome-192x192.png?v=2.3.8">
    <link rel="icon" type="image/png" sizes="512x512" href="android-chrome-512x512.png?v=2.3.8">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js?v=2.3.8"></script>
    
    <style>
        /* Стиль для баннера обновления */
        .update-banner {
            position: fixed;
            bottom: 20px;
            left: 16px;
            right: 16px;
            background: #2c3e50;
            border-left: 4px solid #00f0ff;
            border-radius: 12px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            transform: translateY(120px);
            transition: transform 0.3s ease;
            backdrop-filter: blur(10px);
            background: rgba(26, 26, 26, 0.95);
        }
        .update-banner.show {
            transform: translateY(0);
        }
        .update-banner-text {
            font-size: 14px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .update-banner-btn {
            background: #00f0ff;
            border: none;
            border-radius: 20px;
            padding: 6px 16px;
            color: #0a0a0a;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .update-banner-btn:hover {
            background: #4ade80;
            transform: scale(1.02);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-card: #1a1a1a;
            --accent-cyan: #00f0ff;
            --accent-cyan-glow: rgba(0, 240, 255, 0.3);
            --accent-cyan-dim: rgba(0, 240, 255, 0.1);
            --accent-green: #4ade80;
            --accent-yellow: #facc15;
            --accent-yellow-glow: rgba(250, 204, 21, 0.25);
            --error-red: #f87171;
            --error-red-glow: rgba(255, 68, 68, 0.3);
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --border-color: #333333;
            --base-font-size-search: 1.3rem;
            --base-font-size-title: 16px;
            --base-font-size-detail: 13px;
            --base-font-size-label: 13px;
            --base-font-size-button: 13px;
            --base-font-size-context: 0.85rem;
            --base-font-size-no-results: 14px;
        }
        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .screen {
            display: none;
            min-height: 100vh;
            width: 100%;
        }
        .screen.active {
            display: flex;
            flex-direction: column;
        }
        #loading-screen {
            justify-content: center;
            align-items: center;
            background: var(--bg-primary);
            padding: 20px;
        }
        .loading-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 50px 30px;
            width: 100%;
            max-width: 340px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
        }
        .app-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--accent-cyan);
            text-shadow: 0 0 20px var(--accent-cyan-glow), 0 0 40px var(--accent-cyan-glow);
            animation: pulse-title 2s ease-in-out infinite;
            letter-spacing: -0.5px;
        }
        @keyframes pulse-title {
            0%, 100% {
                opacity: 1;
                text-shadow: 0 0 20px var(--accent-cyan-glow), 0 0 40px var(--accent-cyan-glow);
            }
            50% {
                opacity: 0.85;
                text-shadow: 0 0 30px var(--accent-cyan-glow), 0 0 60px var(--accent-cyan), 0 0 80px var(--accent-cyan-glow);
            }
        }
        .app-version {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 40px;
            font-weight: 400;
        }
        .spinner-container {
            margin: 30px 0;
        }
        .spinner {
            width: 60px;
            height: 60px;
            margin: 0 auto;
            position: relative;
        }
        .spinner::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 50%;
            border: 3px solid var(--bg-secondary);
        }
        .spinner-progress {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: var(--accent-cyan);
            border-right-color: var(--accent-cyan);
            animation: spin 1s linear infinite;
            box-shadow: 0 0 10px var(--accent-cyan-glow);
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-text {
            color: var(--text-secondary);
            font-size: 15px;
            margin-top: 25px;
            letter-spacing: 0.5px;
        }

        #login-screen {
            justify-content: center;
            align-items: center;
            background: var(--bg-primary);
            padding: 20px;
            min-height: 100vh;
        }
        .login-card {
            background: transparent;
            border-radius: 24px;
            padding: 40px 28px;
            width: 100%;
            max-width: 380px;
            margin: 0 auto;
            box-shadow: none;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--accent-cyan);
            text-shadow: 0 0 20px var(--accent-cyan-glow);
            letter-spacing: -0.5px;
        }
        .login-subtitle {
            color: var(--text-secondary);
            font-size: 15px;
            font-weight: 400;
        }

        .pin-dots-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            margin-bottom: 40px;
            min-height: 24px;
        }
        .pin-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid var(--border-color);
            background: transparent;
            transition: all 0.2s ease;
        }
        .pin-dot.filled {
            background: var(--accent-cyan);
            border-color: var(--accent-cyan);
            box-shadow: 0 0 12px var(--accent-cyan-glow);
        }
        .pin-dot.error {
            background: var(--error-red);
            border-color: var(--error-red);
            box-shadow: 0 0 12px var(--error-red-glow);
            animation: shake 0.4s ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        .pin-hidden-input {
            position: absolute;
            opacity: 0;
            pointer-events: none;
            width: 1px;
            height: 1px;
        }

        .pin-pad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            width: 100%;
            max-width: 300px;
            margin-bottom: 30px;
        }
        .pin-btn {
            aspect-ratio: 1;
            border-radius: 50%;
            border: 1.5px solid var(--border-color);
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 28px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            user-select: none;
            -webkit-user-select: none;
            position: relative;
            overflow: hidden;
        }
        .pin-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            transform: translate(-50%, -50%);
            transition: width 0.3s ease, height 0.3s ease;
        }
        .pin-btn:active::after {
            width: 100%;
            height: 100%;
        }
        .pin-btn:active {
            transform: scale(0.92);
            border-color: var(--accent-cyan);
            box-shadow: 0 0 20px var(--accent-cyan-glow);
            background: var(--bg-card);
        }
        .pin-btn.empty {
            visibility: hidden;
            pointer-events: none;
        }
        .pin-btn.backspace {
            font-size: 22px;
            color: var(--text-secondary);
        }
        .pin-btn.backspace:active {
            border-color: var(--error-red);
            color: var(--error-red);
            box-shadow: 0 0 15px var(--error-red-glow);
        }

        .forgot-pin {
            color: var(--text-secondary);
            font-size: 15px;
            text-decoration: underline;
            text-underline-offset: 3px;
            cursor: pointer;
            background: none;
            border: none;
            font-family: inherit;
            transition: color 0.2s;
            margin-top: 10px;
        }
        .forgot-pin:hover {
            color: var(--accent-cyan);
        }

        @media (max-width: 380px) {
            .pin-pad {
                gap: 12px;
            }
            .pin-btn {
                font-size: 24px;
            }
            .login-card {
                padding: 30px 20px;
            }
        }
        @media (max-height: 700px) {
            .login-card {
                padding: 25px 20px;
            }
            .pin-dots-container {
                margin-bottom: 25px;
            }
            .pin-pad {
                margin-bottom: 20px;
            }
        }

        #main-screen {
            background: var(--bg-primary);
            padding: 20px 16px;
            min-height: 100vh;
            position: relative;
        }
        #main-screen::before {
            content: '';
            position: fixed;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 180px;
            height: 180px;
            background-image: url('logo.png?v=2.3.8');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0.25;
            pointer-events: none;
            z-index: 0;
            animation: logoPulse 3s ease-in-out infinite;
        }
        @keyframes logoPulse {
            0%, 100% {
                opacity: 0.25;
                filter: brightness(1) drop-shadow(0 0 0px rgba(0, 240, 255, 0));
            }
            50% {
                opacity: 0.55;
                filter: brightness(1.2) drop-shadow(0 0 15px rgba(0, 240, 255, 0.3));
            }
        }
        .main-container {
            max-width: 480px;
            margin: 0 auto;
            width: 100%;
            position: relative;
            z-index: 1;
        }
        .sticky-search-wrapper {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg-primary);
            padding-top: 0;
            margin: 0 -16px;
            padding-left: 16px;
            padding-right: 16px;
        }
        .header-info {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            width: 100%;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }
        .header-titles {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            text-align: left;
        }
        .greeting {
            font-size: 20px;
            font-weight: 500;
            margin: 0;
            color: var(--text-primary);
        }
        h2.greeting {
            font-size: 22px;
            margin-bottom: 4px;
            color: var(--accent-cyan);
            text-shadow: 0 0 15px var(--accent-cyan-glow);
            font-weight: 600;
        }
        h3.greeting {
            font-size: 14px;
            font-weight: 400;
            color: var(--text-secondary);
        }
        .menu-btn {
            width: auto;
            background: rgba(220, 20, 20, 0.15);
            border: 1px solid rgba(220, 20, 20, 0.4);
            border-radius: 25px;
            padding: 8px 20px;
            color: #dc1414;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            flex-shrink: 0;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 0 12px rgba(220, 20, 20, 0.2);
        }
        .menu-btn:hover {
            background: rgba(220, 20, 20, 0.3);
            box-shadow: 0 0 18px rgba(220, 20, 20, 0.4);
            border-color: #dc1414;
        }
        .zoom-panel {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
            gap: 12px;
            width: 100%;
        }
        .zoom-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 6px 16px;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            min-width: 44px;
        }
        .zoom-btn:hover {
            border-color: var(--accent-green);
            color: var(--accent-green);
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.3);
            background: transparent;
        }
        .zoom-btn:active {
            transform: scale(0.95);
        }
        .zoom-indicator {
            color: var(--accent-green);
            font-size: 14px;
            font-weight: 600;
            padding: 4px 14px;
            background: rgba(74, 222, 128, 0.1);
            border-radius: 20px;
            min-width: 85px;
            text-align: center;
        }
        .drawer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.3s ease, opacity 0.3s ease;
        }
        .drawer-overlay.active {
            visibility: visible;
            opacity: 1;
        }
        .drawer {
            position: fixed;
            top: 0;
            right: -50%;
            width: 50%;
            height: 100%;
            background: var(--bg-card);
            border-left: 1px solid var(--border-color);
            box-shadow: -5px 0 30px rgba(0, 0, 0, 0.5);
            z-index: 1001;
            transition: right 0.35s ease-out;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .drawer.active {
            right: 0;
        }
        @media (max-width: 768px) {
            .drawer { width: 50%; right: -50%; }
        }
        @media (max-width: 480px) {
            .drawer { width: 50%; right: -50%; }
        }
        .drawer-header {
            padding: 24px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .drawer-header h3 {
            color: var(--accent-cyan);
            font-size: 18px;
            font-weight: 600;
            transition: font-size 0.3s ease;
        }
        .drawer-close {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 24px;
            cursor: pointer;
            padding: 0 8px;
            transition: color 0.2s;
        }
        .drawer-close:hover {
            color: var(--error-red);
        }
        .drawer-menu {
            flex: 1;
            padding: 16px 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .drawer-item {
            background: transparent;
            border: none;
            padding: 14px 20px;
            text-align: left;
            color: var(--text-primary);
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s ease;
            width: 100%;
            border-bottom: 1px solid var(--border-color);
        }
        .drawer-item:hover {
            background: rgba(0, 240, 255, 0.1);
            color: var(--accent-cyan);
            padding-left: 24px;
        }
        .drawer-item .item-icon {
            font-size: 18px;
            min-width: 28px;
        }
        .drawer-submenu {
            display: none;
            flex-direction: column;
            background: var(--bg-secondary);
            margin: 0;
            border-radius: 0;
        }
        .drawer-submenu.active {
            display: flex;
        }
        .drawer-submenu .drawer-item {
            padding-left: 48px;
            font-size: 14px;
        }
        .drawer-back {
            border-top: 1px solid var(--border-color);
            margin-top: 8px;
            color: var(--text-secondary);
        }
        .drawer-back:hover {
            color: var(--accent-cyan);
        }
        .search-section {
            margin-bottom: 16px;
            width: 100%;
        }
        .search-input {
            width: 100%;
            background: var(--bg-secondary);
            border: 2px solid var(--accent-cyan);
            border-radius: 14px;
            padding: 16px 18px;
            color: var(--text-primary);
            font-size: var(--base-font-size-search);
            outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px var(--accent-cyan-glow), inset 0 0 8px var(--accent-cyan-dim);
        }
        .search-input:hover {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 28px var(--accent-cyan-glow), inset 0 0 12px var(--accent-cyan-dim);
            background: var(--bg-card);
        }
        .search-input:focus {
            border-color: var(--accent-cyan);
            background: var(--bg-card);
            box-shadow: 0 0 32px var(--accent-cyan-glow), inset 0 0 14px var(--accent-cyan-dim);
        }
        @keyframes marquee {
            0% { text-indent: 0; }
            50% { text-indent: -30px; }
            100% { text-indent: 0; }
        }
        .search-input::placeholder {
            color: var(--text-muted);
            font-size: 1rem;
            animation: marquee 8s ease-in-out infinite;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: clip;
        }
        .results-container {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            z-index: 1;
        }
        
        .results-container.restored-result .result-card * {
            color: var(--text-secondary) !important;
        }

        .results-container.restored-result .match-percent {
            display: none !important;
        }

        .results-container.restored-result .parking-buttons {
            display: none !important;
        }

        .results-container.restored-result .result-icon {
            color: inherit !important;
            opacity: 0.5;
        }

        .results-container.restored-result .contact-link {
            color: var(--text-secondary) !important;
        }
        .results-container.restored-result .contact-link:hover {
            color: var(--accent-cyan) !important;
        }
        
        .result-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            gap: 14px;
            border: 1px solid var(--border-color);
            transition: all 0.2s;
            cursor: pointer;
            position: relative;
            z-index: 1;
        }
        .result-card:hover {
            border-color: var(--accent-cyan);
            transform: translateX(4px);
            box-shadow: 0 0 20px var(--accent-cyan-glow);
        }
        .result-icon { font-size: 28px; flex-shrink: 0; }
        .result-content { flex: 1; }
        .result-title { font-size: var(--base-font-size-title); font-weight: 600; margin-bottom: 8px; border-bottom: 1px solid var(--border-color); padding-bottom: 6px; transition: font-size 0.3s ease; }
        .result-detail { font-size: var(--base-font-size-detail); margin-bottom: 6px; line-height: 1.5; transition: font-size 0.3s ease; }
        .result-contact { font-size: var(--base-font-size-detail); color: var(--accent-cyan); display: flex; align-items: center; gap: 6px; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border-color); transition: font-size 0.3s ease; }
        .result-contact a { color: var(--accent-cyan); text-decoration: none; }
        .no-results { text-align: center; color: var(--text-muted); padding: 40px 20px; font-size: var(--base-font-size-no-results); background: var(--bg-card); border-radius: 16px; transition: font-size 0.3s ease; position: relative; z-index: 1; }
        .notification { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--bg-card); color: var(--text-primary); padding: 14px 24px; border-radius: 12px; font-size: 14px; z-index: 2000; border: 1px solid var(--border-color); opacity: 0; transition: all 0.3s ease; }
        .notification.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .notification.success { border-color: var(--accent-cyan); box-shadow: 0 0 20px var(--accent-cyan-glow); }
        .notification.error { border-color: var(--error-red); box-shadow: 0 0 20px var(--error-red-glow); }
        .hidden { display: none !important; }
